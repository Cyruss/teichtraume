<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Teichträume — Spezialist für Koiteiche</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400&family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" />

<style>
  :root {
    --bg: #f3efe6;
    --paper: #ebe6da;
    --ink: #0d0d0d;
    --ink-2: #2a2723;
    --ink-3: #6a655c;
    --rule: #1a1a1a;
    --koi: #b9121b;
    --koi-deep: #8c0d15;
    --pond: #2d4a3e;
    --max: 1440px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink); }
  body {
    font-family: "Inter Tight", system-ui, sans-serif;
    font-weight: 400;
    font-size: 16px;
    line-height: 1.5;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  img { display: block; max-width: 100%; }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }

  .serif { font-family: "Fraunces", "Iowan Old Style", Georgia, serif; font-weight: 400; letter-spacing: -0.01em; }
  .mono { font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }

  /* Ripple canvas */
  #ripple-canvas {
    position: fixed; inset: 0; pointer-events: none; z-index: 9999;
    mix-blend-mode: multiply;
  }

  /* Selection */
  ::selection { background: var(--koi); color: var(--bg); }

  /* Scrollbar */
  html { scrollbar-color: var(--ink) var(--bg); scrollbar-width: thin; }

  /* Reveal */
  .reveal { opacity: 0; transform: translateY(24px); transition: opacity 1s cubic-bezier(.2,.7,.2,1), transform 1s cubic-bezier(.2,.7,.2,1); }
  .reveal.in { opacity: 1; transform: translateY(0); }
  .reveal.d1 { transition-delay: .08s; }
  .reveal.d2 { transition-delay: .16s; }
  .reveal.d3 { transition-delay: .24s; }
  .reveal.d4 { transition-delay: .32s; }

  /* Utility */
  .container { max-width: var(--max); margin: 0 auto; padding: 0 32px; }
  @media (max-width: 720px){ .container { padding: 0 20px; } }

  /* ============================================================
     MOBILE RESPONSIVE OVERRIDES
     Targets inline styles via attribute selectors so we don't
     have to edit every component.
     ============================================================ */
  @media (max-width: 900px) {
    .nav-sub { display: none !important; }
    /* Global section padding */
    section { padding-left: 20px !important; padding-right: 20px !important; }
    section[style*="padding: 140px"] { padding-top: 80px !important; padding-bottom: 70px !important; }
    section[style*="padding: 120px"] { padding-top: 70px !important; padding-bottom: 60px !important; }

    /* Any inline 2/3/4-column grid collapses to 1 column */
    [style*="gridTemplateColumns"],
    [style*="grid-template-columns"] {
      grid-template-columns: 1fr !important;
      gap: 28px !important;
    }

    /* Type scale */
    h1, h2, h3 { text-wrap: balance; }

    /* Nav */
    header[style*="position: fixed"] { padding: 14px 20px !important; }
    header nav { display: none !important; }
    header .mobile-menu-btn { display: inline-flex !important; }

    /* Hero */
    #hero { min-height: 620px !important; }
    #hero [style*="top: 110px"],
    #hero [style*="top:110px"] { top: 78px !important; padding: 0 20px !important; gap: 6px !important; flex-wrap: wrap !important; font-size: 10px !important; }
    #hero [style*="bottom: 0"] { padding: 0 20px 40px !important; }

    /* Marquee — slow down a bit */
    .marquee-track { animation-duration: 40s !important; }

    /* About stats */
    #about [style*="repeat(4, 1fr)"] { grid-template-columns: 1fr 1fr !important; }

    /* Services — make list+detail stacked */
    #services [style*="position: sticky"],
    #services [style*="position:sticky"] { position: static !important; }
    #services button > div { grid-template-columns: 44px 1fr !important; gap: 14px !important; }
    #services button > div > div:last-child { display: none !important; }

    /* Zubehör — 1 col */
    #zubehoer .zubehoer-card { min-height: 280px !important; }

    /* Gallery — single column */
    #gallery [style*="gridTemplateColumns"] { grid-template-columns: 1fr !important; }
    #gallery [style*="gridRow"],
    #gallery [style*="grid-row"] { grid-row: auto !important; }
    #gallery [style*="aspectRatio"],
    #gallery [style*="aspect-ratio"] { aspect-ratio: 4/3 !important; }

    /* Instagram row scrolls horizontally */
    #instagram [style*="overflowX"],
    #instagram [style*="overflow-x"] { overflow-x: auto !important; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
    #instagram [style*="overflowX"] > * { scroll-snap-align: start; min-width: 70vw !important; }

    /* Contact */
    #contact a[href^="mailto"],
    #contact a[href^="tel"],
    #contact a[href*="wa.me"],
    #contact a[href*="instagram"] { font-size: clamp(28px, 8vw, 52px) !important; }

    /* Footer */
    footer .foot { flex-direction: column; align-items: flex-start !important; }

    /* Any mono-size meta row */
    [style*="justifyContent: \"space-between\""] { flex-wrap: wrap; gap: 8px; }

    /* Buttons: full-width friendly */
    a[style*="padding: 16px 24px"],
    a[style*="padding: 16px 22px"] { padding: 14px 20px !important; font-size: 13px !important; }
  }

  @media (max-width: 560px) {
    /* Hide scrolling indicator on very small */
    #hero [style*="Scrollen"] { display: none !important; }
    /* Tweaks panel: compact */
    body > div[style*="position: fixed"][style*="bottom"] { right: 12px !important; left: 12px !important; max-width: none !important; }
  }

  /* Mobile menu button — hidden on desktop, shown via override */
  .mobile-menu-btn { display: none; align-items: center; justify-content: center; width: 44px; height: 44px; border: 1px solid currentColor; border-radius: 999px; }
  .mobile-menu { position: fixed; inset: 0; background: var(--bg); z-index: 200; padding: 80px 24px 32px; display: none; flex-direction: column; gap: 8px; overflow-y: auto; }
  .mobile-menu.open { display: flex; }
  .mobile-menu a { font-family: "Fraunces", serif; font-size: 32px; padding: 14px 0; border-bottom: 1px solid rgba(13,13,13,0.1); }
  .mobile-menu .close { position: absolute; top: 20px; right: 20px; width: 44px; height: 44px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--ink); border-radius: 999px; }

  /* Touch: bigger tap targets */
  @media (hover: none) {
    a, button { min-height: 32px; }
  }
</style>
</head>
<body>
  <canvas id="ripple-canvas"></canvas>
  <div id="root"></div>

  <!-- Hidden templates used by app.jsx -->
  <template id="koi-svg">
    <!-- Inline koi adapted from logo, simplified -->
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <g transform="translate(50 50)">
        <path d="M -4 -38 C 4 -30, 10 -18, 6 -6 C 22 2, 30 16, 22 30 C 10 40, -10 38, -18 28 C -26 20, -22 10, -18 2 C -22 -10, -14 -32, -4 -38 Z"
              fill="currentColor"/>
        <circle cx="-2" cy="-22" r="2.6" fill="#0d0d0d"/>
        <path d="M 8 -4 q 6 4 10 0 q -4 6 -10 0" fill="#0d0d0d"/>
        <path d="M -16 2 q -4 10 2 14 q -10 -2 -8 -14" fill="#0d0d0d" opacity=".85"/>
      </g>
    </svg>
  </template>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="ripples.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
